// ── IndexedDB ストレージ ───────────────────────────
const DB_NAME = "myshelf_db";
const DB_VERSION = 1;
const STORE_NAME = "books";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, {
          keyPath: "id"
        });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function loadFromStorage() {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const req = tx.objectStore(STORE_NAME).getAll();
      req.onsuccess = e => {
        const books = e.target.result || [];
        // createdAt がなければ補完
        resolve(books.map(b => b.createdAt ? b : {
          ...b,
          createdAt: new Date().toISOString()
        }));
      };
      req.onerror = () => resolve([]);
    });
  } catch {
    return [];
  }
}
async function saveToStorage(books) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    // 全件クリアして書き直し
    await new Promise((res, rej) => {
      const r = store.clear();
      r.onsuccess = res;
      r.onerror = rej;
    });
    for (const book of books) {
      store.put(book);
    }
    return new Promise((res, rej) => {
      tx.oncomplete = res;
      tx.onerror = rej;
    });
  } catch (e) {
    console.warn("IndexedDB save error", e);
  }
}

// localStorage からの移行（初回のみ）
async function migrateFromLocalStorage() {
  try {
    const old = localStorage.getItem(STORAGE_KEY);
    if (!old) return;
    const books = JSON.parse(old);
    if (books.length > 0) {
      await saveToStorage(books);
      localStorage.removeItem(STORAGE_KEY);
      console.log("migrated", books.length, "books from localStorage");
    }
  } catch {/* 移行失敗は無視 */}
}
async function fetchBookByQuery(query) {
  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5`);
    const data = await res.json();
    return data.items || [];
  } catch {
    return [];
  }
}
function extractASIN(url) {
  const m = url.match(/\/(?:dp|gp\/product|ASIN)\/([A-Z0-9]{10})/i);
  return m ? m[1] : null;
}
async function fetchBookByAmazonURL(url) {
  const asin = extractASIN(url);
  if (!asin) return null;
  const results = await fetchBookByQuery(asin);
  return results[0] || null;
}
function getWeekKey(dateStr) {
  if (!dateStr) return "不明";
  const d = new Date(dateStr);
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = dt => `${dt.getMonth() + 1}/${dt.getDate()}`;
  return `${d.getFullYear()}年 ${fmt(mon)}〜${fmt(sun)}`;
}
function getMonthKey(dateStr) {
  if (!dateStr) return "不明";
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth() + 1}月`;
}
function formatDate(dateStr) {

  });
}
function fmtTime(iso) {

}

// ── AIプロンプト生成 ───────────────────────────────
function buildAIPrompt(books) {
  const done = books.filter(b => b.status === "done");
  const reading = books.filter(b => b.status === "reading");
  const want = books.filter(b => b.status === "want");
  const bookBlock = list => list.map(b => {
    const tags = b.tags?.length ? ` [${b.tags.join(", ")}]` : "";
    const date = b.doneDate ? ` (読了: ${formatDate(b.doneDate)})` : "";
    const notes = (b.notes || []).map(n => `    ・${n.text}`).join("\n");
    return `  「${b.title}」${b.author ? " / " + b.author : ""}${tags}${date}${notes ? "\n" + notes : ""}`;
  }).join("\n");
  return `以下は私の読書記録です。自己研鑽・学習の振り返りレポートとして活用できるよう、以下の点でまとめてください。

## 読了した本 (${done.length}冊)
${done.length > 0 ? bookBlock(done) : "  なし"}

## 読書中の本 (${reading.length}冊)
${reading.length > 0 ? bookBlock(reading) : "  なし"}

## 読みたい本 (${want.length}冊)
${want.length > 0 ? bookBlock(want) : "  なし"}

---
【まとめてほしい内容】
1. 読書傾向（興味のあるジャンル・テーマの分析）
2. 主な学び（読了本とメモから得られた知見・気づき）
3. 今後の学習への提言（読みたい本リストも踏まえて）
4. 自己研鑽レポート用の一言コメント（200字程度）`;
}

// ── 画像をBase64に変換（登録時に一度だけ） ─────────
async function imageUrlToBase64(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result); // "data:image/jpeg;base64,..."
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch {
    return url; // 失敗したら元のURLをそのまま使う
  }
}
